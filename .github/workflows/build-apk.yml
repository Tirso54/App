name: Build Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.3.1

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::El secret KEYSTORE_BASE64 está vacío o no existe. Revisa Settings → Secrets and variables → Actions."
            exit 1
          fi
          # -d ignora caracteres no válidos (saltos de línea, espacios) que suelen
          # colarse al copiar/pegar en móvil
          echo "$KEYSTORE_BASE64" | tr -d '[:space:]' | base64 -d > my-upload-key.jks
          if [ ! -s my-upload-key.jks ]; then
            echo "::error::El keystore decodificado está vacío. El secret KEYSTORE_BASE64 probablemente está corrupto o incompleto."
            exit 1
          fi
          echo "Keystore decodificado correctamente ($(wc -c < my-upload-key.jks) bytes)"

      - name: Build Release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/my-upload-key.jks
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: gradle assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release.apk
